# .github/workflows/deploy.yml
name: Deploy Mulila Governor to VPS via Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with build args
        run: |
          docker build \
            -f Dockerfile\
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mulila_governor:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mulila_governor:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting deployment..."

            cd /home/dockeruser/mulila_governor

            echo "📦 Pulling latest image..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mulila_governor:latest

            echo "🛑 Stopping existing container..."
            docker compose down || true

            echo "▶️ Starting new container..."
            docker compose up -d

            echo "🧹 Cleaning up..."
            docker image prune -f

            echo "📊 Container status:"
            docker ps

            echo "✅ Deployment completed!"
