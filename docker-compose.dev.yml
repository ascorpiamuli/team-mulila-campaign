services:
  mongo:
    image: mongo:6
    container_name: ascorpi_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ascorpi
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - proxy

  mongo-express:
    image: mongo-express
    container_name: ascorpi_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    networks:
      - proxy
    depends_on:
      - mongo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mongo-express.rule=Host(`mongo.internal`)"
      - "traefik.http.routers.mongo-express.entrypoints=websecure"
      - "traefik.http.routers.mongo-express.tls=true"
      - "traefik.http.services.mongo-express.loadbalancer.server.port=8081"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ascorpi_backend
    working_dir: /usr/src/app
    volumes:
      - ./backend:/usr/src/app
      - ./backend/node_modules:/usr/src/app/node_modules
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:admin123@ascorpi_mongo:27017/ascorpi?authSource=admin
      JWT_SECRET: your_local_dev_secret_key
    networks:
      - proxy
    depends_on:
      - mongo
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm run dev"
# read - Read configuration

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ascorpi_frontend
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
      - ./node_modules:/usr/src/app/node_modules
    networks:
      - proxy
    depends_on:
      - backend
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm run dev"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ascorpi.rule=Host(`ascorpi.internal`)"
      - "traefik.http.routers.ascorpi.entrypoints=websecure"
      - "traefik.http.routers.ascorpi.tls=true"
      - "traefik.http.services.ascorpi.loadbalancer.server.port=3000"

volumes:
  mongo_data:

networks:
  proxy:
    external: true
